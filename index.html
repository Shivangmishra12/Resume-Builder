<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ResumeForge — Build Your Future</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
  :root {
    --ink: #0d0d0d;
    --paper: #faf8f5;
    --cream: #f2ede6;
    --gold: #c9a84c;
    --gold-light: #e8cc85;
    --rust: #c0392b;
    --sage: #4a7c5f;
    --slate: #2c3e50;
    --mid: #7f8c8d;
    --border: #d4cfc8;
    --white: #ffffff;
    --shadow: 0 4px 24px rgba(0,0,0,0.08);
    --shadow-lg: 0 16px 48px rgba(0,0,0,0.14);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
  }

  
  header {
    background: var(--ink);
    color: var(--paper);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 2px solid var(--gold);
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    font-weight: 900;
    letter-spacing: -0.5px;
    color: var(--gold);
  }

  .logo span { color: var(--paper); }

  .header-actions { display: flex; gap: 0.75rem; align-items: center; }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.5rem 1.25rem;
    border-radius: 4px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.875rem;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.2s ease;
    text-decoration: none;
    letter-spacing: 0.02em;
  }

  .btn-primary {
    background: var(--gold);
    color: var(--ink);
  }
  .btn-primary:hover { background: var(--gold-light); transform: translateY(-1px); }

  .btn-outline {
    background: transparent;
    color: var(--paper);
    border: 1.5px solid var(--border);
  }
  .btn-outline:hover { border-color: var(--gold); color: var(--gold); }

  .btn-ghost {
    background: transparent;
    color: var(--mid);
    border: 1.5px solid var(--border);
  }
  .btn-ghost:hover { background: var(--cream); color: var(--ink); }

  .btn-danger {
    background: #fdf0ef;
    color: var(--rust);
    border: 1.5px solid #f5c6c3;
  }
  .btn-danger:hover { background: #fce4e2; }

  
  .app-shell {
    display: grid;
    grid-template-columns: 420px 1fr;
    height: calc(100vh - 64px);
  }

  
  .sidebar {
    background: var(--white);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }

  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-track { background: var(--cream); }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  
  .tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    background: var(--cream);
    padding: 0 1rem;
    gap: 0.25rem;
    overflow-x: auto;
    flex-shrink: 0;
  }

  .tab {
    padding: 0.75rem 1rem;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    color: var(--mid);
    border-bottom: 2.5px solid transparent;
    transition: all 0.2s;
    white-space: nowrap;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    background: none;
    border-left: none;
    border-right: none;
    border-top: none;
    font-family: 'DM Sans', sans-serif;
  }

  .tab.active {
    color: var(--ink);
    border-bottom-color: var(--gold);
  }

  .tab-content { display: none; padding: 1.5rem; flex: 1; }
  .tab-content.active { display: block; }

  
  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 1.25rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
  }

  .form-group { margin-bottom: 1rem; }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }

  label {
    display: block;
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--mid);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 0.35rem;
  }

  input, textarea, select {
    width: 100%;
    padding: 0.6rem 0.85rem;
    border: 1.5px solid var(--border);
    border-radius: 4px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    color: var(--ink);
    background: var(--paper);
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
  }

  input:focus, textarea:focus, select:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(201,168,76,0.15);
    background: var(--white);
  }

  textarea { resize: vertical; min-height: 80px; line-height: 1.5; }

  
  .entry-card {
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 1rem;
    margin-bottom: 0.75rem;
    position: relative;
  }

  .entry-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.75rem;
    font-weight: 600;
    font-size: 0.85rem;
    color: var(--slate);
  }

  .remove-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--rust);
    font-size: 1rem;
    padding: 0.2rem;
    line-height: 1;
    opacity: 0.6;
    transition: opacity 0.2s;
  }
  .remove-btn:hover { opacity: 1; }

  .add-btn {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    width: 100%;
    padding: 0.6rem;
    border: 1.5px dashed var(--border);
    background: none;
    color: var(--mid);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s;
    margin-top: 0.5rem;
  }
  .add-btn:hover { border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,0.05); }

  
  .template-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.75rem;
    margin-bottom: 1.5rem;
  }

  .template-card {
    cursor: pointer;
    border-radius: 6px;
    overflow: hidden;
    border: 2px solid var(--border);
    transition: all 0.2s;
    position: relative;
  }

  .template-card.selected { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201,168,76,0.2); }
  .template-card:hover { border-color: var(--gold-light); }

  .template-preview {
    width: 100%;
    height: 90px;
    display: flex;
    flex-direction: column;
    padding: 6px;
    font-size: 4px;
    line-height: 1.4;
    overflow: hidden;
  }

  .template-label {
    font-size: 0.7rem;
    font-weight: 600;
    text-align: center;
    padding: 0.4rem;
    background: var(--cream);
    color: var(--mid);
  }

  .template-card.selected .template-label { background: var(--gold); color: var(--ink); }

  
  .preview-pane {
    background: #e8e4df;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }

  .preview-toolbar {
    background: var(--ink);
    padding: 0.75rem 1.5rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }

  .preview-toolbar-left {
    display: flex;
    gap: 0.5rem;
    align-items: center;
  }

  .zoom-info {
    font-size: 0.75rem;
    color: var(--mid);
    font-family: 'DM Mono', monospace;
  }

  .preview-wrapper {
    flex: 1;
    display: flex;
    justify-content: center;
    padding: 2rem;
    overflow-y: auto;
  }

  
  #resume-output {
    width: 794px;
    min-height: 1123px;
    background: white;
    box-shadow: var(--shadow-lg);
    flex-shrink: 0;
    position: relative;
    transform-origin: top center;
  }

  
  .tpl-classic {
    font-family: 'Georgia', serif;
    padding: 60px 70px;
    color: #222;
  }

  .tpl-classic .r-name {
    font-size: 2.2rem;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: #1a1a1a;
    margin-bottom: 0.2rem;
  }

  .tpl-classic .r-title {
    font-size: 1rem;
    color: #666;
    margin-bottom: 0.75rem;
    font-style: italic;
  }

  .tpl-classic .r-contact {
    display: flex;
    flex-wrap: wrap;
    gap: 1rem;
    font-size: 0.82rem;
    color: #555;
    padding-bottom: 1rem;
    margin-bottom: 1.5rem;
    border-bottom: 2px solid #222;

  .tpl-classic .r-contact span::before { content: '· '; }
  .tpl-classic .r-contact span:first-child::before { content: ''; }

  .tpl-classic .r-section { margin-bottom: 1.5rem; }

  .tpl-classic .r-section-title {
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;

  .tpl-classic .r-entry-title { font-weight: 700; font-size: 0.92rem; }
  .tpl-classic .r-entry-org { font-style: italic; font-size: 0.85rem; color: #555; }
  .tpl-classic .r-entry-date { font-size: 0.8rem; color: #777; }

  .tpl-classic .r-entry-desc {

  .tpl-classic .r-skills-grid {

  .tpl-classic .r-skill {

  }

  
  .tpl-modern {
    font-family: 'DM Sans', sans-serif;
    display: grid;
    grid-template-columns: 240px 1fr;
    min-height: 1123px;
    color: #222;
  }

  .tpl-modern .sidebar-col {

    color: #e0ddd8;
    padding: 50px 24px;
  }

  .tpl-modern .main-col {
    padding: 50px 40px;
  }

  .tpl-modern .r-name {
    font-size: 1.5rem;
    font-weight: 700;
    color: #fff;

    margin-bottom: 0.3rem;
  }

  .tpl-modern .r-title {
    font-size: 0.8rem;
    color: #c9a84c;

  }

  .tpl-modern .s-section { margin-bottom: 1.5rem; }

  .tpl-modern .s-section-title {
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #c9a84c;
    margin-bottom: 0.75rem;
    padding-bottom: 0.4rem;
    border-bottom: 1px solid rgba(201,168,76,0.3);
  }

  .tpl-modern .s-contact-item {
    font-size: 0.78rem;

  .tpl-modern .s-contact-icon { color: #c9a84c; flex-shrink: 0; margin-top: 1px; }

  .tpl-modern .s-skill {
    background: rgba(255,255,255,0.08);
    padding: 0.25rem 0.6rem;
    border-radius: 3px;
    font-size: 0.76rem;

  }

  .tpl-modern .m-section { margin-bottom: 1.5rem; }

  .tpl-modern .m-section-title {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #1e2d3d;
    margin-bottom: 0.75rem;

    border-bottom: 2px solid #1e2d3d;
  }

  .tpl-modern .m-summary { font-size: 0.87rem; line-height: 1.7; color: #444; }

  .tpl-modern .m-entry { margin-bottom: 1.1rem; }

  .tpl-modern .m-entry-header { display: flex; justify-content: space-between; align-items: baseline; }

  .tpl-modern .m-entry-title { font-size: 0.9rem; font-weight: 700; color: #1e2d3d; }
  .tpl-modern .m-entry-org { font-size: 0.82rem; color: #666; margin-top: 0.1rem; }
  .tpl-modern .m-entry-date { font-size: 0.76rem; color: #c9a84c; font-weight: 600; }

  .tpl-modern .m-entry-desc {
    font-size: 0.82rem;
    line-height: 1.65;
    color: #555;
    margin-top: 0.3rem;
  }

  
  .tpl-minimal {
    font-family: 'DM Sans', sans-serif;
    padding: 72px 80px;
    color: #111;
    max-width: 794px;
  }

  .tpl-minimal .r-header {
    display: flex;

  .tpl-minimal .r-section-title {

  .tpl-minimal .r-summary { font-size: 0.87rem; line-height: 1.8; color: #333; }

  .color-dot {

  .preview-pane::-webkit-scrollbar { width: 6px; }
  .preview-pane::-webkit-scrollbar-track { background: #e0dbd6; }

<script>

let state = {
  template: 'classic',
  experience: [],
  education: [],
  certs: []
};

// ─── BACKEND CONFIG ───────────────────────────────────────────────────────────
// After deploying your backend to Railway or Render, paste its URL here.
// Example: 'https://resume-builder-backend.up.railway.app'
// Leave empty ('') to disable save/load (app still works for PDF export).
const BACKEND_URL = 'https://resume-builder-backend-n6mm.onrender.com';
// ──────────────────────────────────────────────────────────────────────────────

async function saveResume() {
  if (!BACKEND_URL) { showToast('⚠️ No backend URL configured'); return; }
  try {
    const payload = getValues();
    const response = await fetch(`${BACKEND_URL}/api/resume`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    if (!response.ok) throw new Error('Save failed');
    showToast('💾 Resume saved to server');
  } catch (err) {
    showToast('⚠️ Could not save resume');
    console.error(err);
  }
}

async function loadSavedResume() {
  if (!BACKEND_URL) return;
  try {
    const response = await fetch(`${BACKEND_URL}/api/resume`);
    if (!response.ok) return;
    const data = await response.json();
    if (data && Object.keys(data).length) {
      populateForm(data);
      showToast('✅ Loaded saved resume');
    }
  } catch (err) {
    console.warn('Unable to load saved resume', err);
  }
}

function populateForm(vals) {
  document.getElementById('fullName').value = vals.fullName || '';
  document.getElementById('jobTitle').value = vals.jobTitle || '';
  document.getElementById('email').value = vals.email || '';
  document.getElementById('phone').value = vals.phone || '';
  document.getElementById('location').value = vals.location || '';
  document.getElementById('website').value = vals.website || '';
  document.getElementById('summary').value = vals.summary || '';
  document.getElementById('skills').value = vals.skills || '';
  state.experience = vals.experience || [];
  state.education = vals.education || [];
  state.certs = vals.certs || [];
  renderExperienceList();
  renderEducationList();
  renderCertList();
  renderResume();
}

function switchTab(name, el) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  el.classList.add('active');
}


function selectTemplate(name, el) {
  state.template = name;
  document.querySelectorAll('.template-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  renderResume();
}


function addEntry(type) {
  const id = Date.now();
  if (type === 'experience') {
    state.experience.push({ id, title: '', org: '', date: '', desc: '' });
    renderExperienceList();
  } else if (type === 'education') {
    state.education.push({ id, degree: '', school: '', date: '', desc: '' });
    renderEducationList();
  } else if (type === 'cert') {
    state.certs.push({ id, name: '', org: '', date: '' });
    renderCertList();
  }
  renderResume();
}

function removeEntry(type, id) {
  if (type === 'experience') { state.experience = state.experience.filter(e => e.id !== id); renderExperienceList(); }
  else if (type === 'education') { state.education = state.education.filter(e => e.id !== id); renderEducationList(); }
  else if (type === 'cert') { state.certs = state.certs.filter(e => e.id !== id); renderCertList(); }
  renderResume();
}

function updateEntry(type, id, field, value) {
  const arr = type === 'experience' ? state.experience : type === 'education' ? state.education : state.certs;
  const item = arr.find(e => e.id === id);
  if (item) item[field] = value;
  renderResume();
}


function renderExperienceList() {
  const container = document.getElementById('experience-list');
  container.innerHTML = state.experience.map((exp, i) => `
    <div class="entry-card">
      <div class="entry-header">
        <span>Position ${i + 1}</span>
        <button class="remove-btn" onclick="removeEntry('experience',${exp.id})" title="Remove">✕</button>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Job Title</label>
          <input value="${exp.title}" placeholder="Software Engineer" oninput="updateEntry('experience',${exp.id},'title',this.value)">
        </div>
        <div class="form-group">
          <label>Company</label>
          <input value="${exp.org}" placeholder="Acme Corp" oninput="updateEntry('experience',${exp.id},'org',this.value)">
        </div>
      </div>
      <div class="form-group">
        <label>Date Range</label>
        <input value="${exp.date}" placeholder="Jan 2021 – Present" oninput="updateEntry('experience',${exp.id},'date',this.value)">
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea rows="3" placeholder="Key achievements and responsibilities..." oninput="updateEntry('experience',${exp.id},'desc',this.value)">${exp.desc}</textarea>
      </div>
    </div>
  `).join('');
}

function renderEducationList() {
  const container = document.getElementById('education-list');
  container.innerHTML = state.education.map((edu, i) => `
    <div class="entry-card">
      <div class="entry-header">
        <span>Education ${i + 1}</span>
        <button class="remove-btn" onclick="removeEntry('education',${edu.id})" title="Remove">✕</button>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Degree</label>
          <input value="${edu.degree}" placeholder="B.S. Computer Science" oninput="updateEntry('education',${edu.id},'degree',this.value)">
        </div>
        <div class="form-group">
          <label>School</label>
          <input value="${edu.school}" placeholder="MIT" oninput="updateEntry('education',${edu.id},'school',this.value)">
        </div>
      </div>
      <div class="form-group">
        <label>Date Range</label>
        <input value="${edu.date}" placeholder="2016 – 2020" oninput="updateEntry('education',${edu.id},'date',this.value)">
      </div>
      <div class="form-group">
        <label>Notes (optional)</label>
        <input value="${edu.desc}" placeholder="GPA: 3.9, Dean's List" oninput="updateEntry('education',${edu.id},'desc',this.value)">
      </div>
    </div>
  `).join('');
}

function renderCertList() {
  const container = document.getElementById('cert-list');
  container.innerHTML = state.certs.map((c, i) => `
    <div class="entry-card">
      <div class="entry-header">
        <span>Certification ${i + 1}</span>
        <button class="remove-btn" onclick="removeEntry('cert',${c.id})" title="Remove">✕</button>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Name</label>
          <input value="${c.name}" placeholder="AWS Solutions Architect" oninput="updateEntry('cert',${c.id},'name',this.value)">
        </div>
        <div class="form-group">
          <label>Issuer</label>
          <input value="${c.org}" placeholder="Amazon Web Services" oninput="updateEntry('cert',${c.id},'org',this.value)">
        </div>
      </div>
      <div class="form-group">
        <label>Date</label>
        <input value="${c.date}" placeholder="2023" oninput="updateEntry('cert',${c.id},'date',this.value)">
      </div>
    </div>
  `).join('');
}


function getValues() {
  return {
    fullName: document.getElementById('fullName').value || 'Your Name',
    jobTitle: document.getElementById('jobTitle').value || '',
    email: document.getElementById('email').value || '',
    phone: document.getElementById('phone').value || '',
    location: document.getElementById('location').value || '',
    website: document.getElementById('website').value || '',
    summary: document.getElementById('summary').value || '',
    skills: document.getElementById('skills').value || '',
    experience: state.experience,
    education: state.education,
    certs: state.certs
  };
}


function renderContact(vals, separator = ' · ') {
  return [vals.email, vals.phone, vals.location, vals.website].filter(Boolean).join(separator);
}

function renderSkillTags(vals, cls) {
  if (!vals.skills) return '';
  return vals.skills.split(',').map(s => s.trim()).filter(Boolean)
    .map(s => `<span class="${cls}">${s}</span>`).join('');
}

function renderExperienceSection(vals, entryClass, titleClass, orgClass, dateClass, descClass, headerClass) {
  if (!vals.experience.length) return '';
  return vals.experience.map(exp => `
    <div class="${entryClass}">
      <div class="${headerClass}">
        <div>
          <div class="${titleClass}">${exp.title || 'Position'}</div>
          <div class="${orgClass}">${exp.org || ''}</div>
        </div>
        <div class="${dateClass}">${exp.date || ''}</div>
      </div>
      ${exp.desc ? `<div class="${descClass}">${exp.desc.replace(/\n/g,'<br>')}</div>` : ''}
    </div>
  `).join('');
}

function renderEducationSection(vals, entryClass, titleClass, orgClass, dateClass, descClass, headerClass) {
  if (!vals.education.length) return '';
  return vals.education.map(edu => `
    <div class="${entryClass}">
      <div class="${headerClass}">
        <div>
          <div class="${titleClass}">${edu.degree || 'Degree'}</div>
          <div class="${orgClass}">${edu.school || ''}</div>
        </div>
        <div class="${dateClass}">${edu.date || ''}</div>
      </div>
      ${edu.desc ? `<div class="${descClass}">${edu.desc}</div>` : ''}
    </div>
  `).join('');
}


const templates = {
  classic: (vals) => `
    <div class="tpl-classic">
      <div class="r-name">${vals.fullName}</div>
      ${vals.jobTitle ? `<div class="r-title">${vals.jobTitle}</div>` : ''}
      <div class="r-contact">
        ${[vals.email,vals.phone,vals.location,vals.website].filter(Boolean).map(v=>`<span>${v}</span>`).join('')}
      </div>
      ${vals.summary ? `<div class="r-section"><div class="r-section-title">Professional Summary</div><div class="r-summary">${vals.summary.replace(/\n/g,'<br>')}</div></div>` : ''}
      ${vals.experience.length ? `<div class="r-section"><div class="r-section-title">Work Experience</div>${vals.experience.map(exp=>`
        <div class="r-entry">
          <div class="r-entry-header"><div><span class="r-entry-title">${exp.title||'Position'}</span> — <span class="r-entry-org">${exp.org||''}</span></div><span class="r-entry-date">${exp.date||''}</span></div>
          ${exp.desc?`<div class="r-entry-desc">${exp.desc.replace(/\n/g,'<br>')}</div>`:''}
        </div>`).join('')}</div>` : ''}
      ${vals.education.length ? `<div class="r-section"><div class="r-section-title">Education</div>${vals.education.map(edu=>`
        <div class="r-entry">
          <div class="r-entry-header"><div><span class="r-entry-title">${edu.degree||'Degree'}</span>${edu.school?` — <span class="r-entry-org">${edu.school}</span>`:''}</div><span class="r-entry-date">${edu.date||''}</span></div>
          ${edu.desc?`<div class="r-entry-desc">${edu.desc}</div>`:''}
        </div>`).join('')}</div>` : ''}
      ${vals.skills ? `<div class="r-section"><div class="r-section-title">Skills</div><div class="r-skills-grid">${renderSkillTags(vals,'r-skill')}</div></div>` : ''}
      ${vals.certs.length ? `<div class="r-section"><div class="r-section-title">Certifications</div>${vals.certs.map(c=>`<div class="r-entry"><div class="r-entry-header"><span class="r-entry-title">${c.name||''}</span><span class="r-entry-date">${c.date||''}</span></div><div class="r-entry-org">${c.org||''}</div></div>`).join('')}</div>` : ''}
    </div>`,

  modern: (vals) => `
    <div class="tpl-modern">
      <div class="sidebar-col">
        <div class="r-name">${vals.fullName}</div>
        ${vals.jobTitle ? `<div class="r-title">${vals.jobTitle}</div>` : ''}
        ${(vals.email||vals.phone||vals.location||vals.website) ? `<div class="s-section"><div class="s-section-title">Contact</div>
          ${vals.email?`<div class="s-contact-item"><span class="s-contact-icon">✉</span>${vals.email}</div>`:''}
          ${vals.phone?`<div class="s-contact-item"><span class="s-contact-icon">☏</span>${vals.phone}</div>`:''}
          ${vals.location?`<div class="s-contact-item"><span class="s-contact-icon">⌖</span>${vals.location}</div>`:''}
          ${vals.website?`<div class="s-contact-item"><span class="s-contact-icon">⎋</span>${vals.website}</div>`:''}

function renderResume() {
  const vals = getValues();
  const output = document.getElementById('resume-output');
  output.innerHTML = templates[state.template](vals);
}


async function downloadPDF() {
  const name = document.getElementById('fullName').value || 'resume';
  const element = document.getElementById('resume-output');
  showToast('⏳ Generating PDF…');

  const opt = {
    margin: 0,
    filename: `${name.replace(/\s+/g,'_')}_Resume.pdf`,
    image: { type: 'jpeg', quality: 0.98 },
    html2canvas: { scale: 2, useCORS: true, logging: false },
    jsPDF: { unit: 'px', format: [794, 1123], orientation: 'portrait' }
  };

  try {
    await html2pdf().set(opt).from(element).save();
    showToast('✓ PDF downloaded!');
  } catch(e) {
    showToast('✕ Error generating PDF');
  }
}


function clearAll() {
  if (!confirm('Reset all data? This cannot be undone.')) return;
  ['fullName','jobTitle','email','phone','location','website','summary','skills'].forEach(id => {
    document.getElementById(id).value = '';
  });
  state.experience = [];
  state.education = [];
  state.certs = [];
  renderExperienceList();
  renderEducationList();
  renderCertList();
  renderResume();
  showToast('↺ Form cleared');
}


function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
